<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusinessPainKiller</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&display=block" />
    <link rel="preload" href="/logo-splash.png" as="image" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      #bpk-loader {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #000000;
        z-index: 99999;
        opacity: 1;
        transition: opacity 1s ease;
        /* Force GPU layer from first paint on Android */
        will-change: opacity;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      #bpk-loader.hide {
        opacity: 0;
        pointer-events: none;
      }

      .loader-content {
        position: absolute;
        top: 50%;
        left: 50%;
        /* GPU-composited from frame 1 — no Android repaint shift */
        transform: translate3d(-50%, -50%, 0);
        -webkit-transform: translate3d(-50%, -50%, 0);
        will-change: transform, opacity;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        opacity: 0;
        transition: opacity 0.4s ease;
        width: max-content;
      }

      .loader-content.ready {
        opacity: 1;
      }

      .logo {
        width: 180px;
        height: auto;
        display: block;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        animation: breathe 2.8s ease-in-out infinite;
        animation-play-state: paused;
      }

      .loader-content.ready .logo {
        animation-play-state: running;
      }

      @keyframes breathe {
        0%, 100% { transform: scale3d(1, 1, 1); }
        50%       { transform: scale3d(1.07, 1.07, 1); }
      }

      .brand-name {
        font-family: Manrope, sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.3px;
        white-space: nowrap;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }
      .brand-name span { color: #FF1A3C; }

      .tagline {
        font-family: Manrope, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
        white-space: nowrap;
        margin-top: -12px;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }
      .tagline span {
        color: #FF1A3C;
        font-weight: 800;
      }
    </style>
  </head>
  <body>

    <div id="bpk-loader">
      <div class="loader-content" id="loader-content">
        <img id="splash-logo" class="logo" src="/logo-splash.png" alt="BPK" />
        <p class="brand-name">Business<span>PainKiller</span></p>
        <p class="tagline">Turn <span>Pain</span> Into Profit</p>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        var loader  = document.getElementById('bpk-loader');
        var content = document.getElementById('loader-content');
        var img     = document.getElementById('splash-logo');
        var root    = document.getElementById('root');

        function showContent() {
          content.classList.add('ready');
        }

        function dismiss() {
          setTimeout(function () {
            loader.classList.add('hide');
            setTimeout(function () {
              if (loader && loader.parentNode) {
                loader.parentNode.removeChild(loader);
              }
            }, 1100);
          }, 2500);
        }

        if (img.complete && img.naturalWidth > 0) {
          showContent();
        } else {
          img.addEventListener('load', showContent);
        }

        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            dismiss();
          }
        });
        observer.observe(root, { childList: true });

        setTimeout(function () {
          observer.disconnect();
          dismiss();
        }, 6000);
      })();
    </script>

  </body>
</html>
