<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusinessPainKiller</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@600;800&display=swap');
      * { margin:0; padding:0; box-sizing:border-box; }
      body { background:#0A0A0A; }

      #bpk-loader {
        position:fixed; inset:0; background:#0A0A0A;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        z-index:99999; transition:opacity 0.8s ease, visibility 0.8s ease;
      }
      #bpk-loader.hide { opacity:0; visibility:hidden; pointer-events:none; }

      .loader-stage {
        position:relative; width:280px; height:280px;
        display:flex; align-items:center; justify-content:center;
      }

      /* Pulsing rings */
      .ring {
        position:absolute; border-radius:50%; border:1px solid rgba(200,16,46,0.15);
      }
      .ring-1 { inset:0;    animation:ringPulse 2.5s ease-in-out infinite; }
      .ring-2 { inset:18px; animation:ringPulse 2.5s ease-in-out infinite 0.4s; border-color:rgba(200,16,46,0.22); }
      .ring-3 { inset:36px; animation:ringPulse 2.5s ease-in-out infinite 0.8s; border-color:rgba(200,16,46,0.10); }
      @keyframes ringPulse {
        0%,100% { transform:scale(1);    opacity:0.5; }
        50%      { transform:scale(1.04); opacity:1;   }
      }

      /* Red ambient glow behind logo */
      .glow {
        position:absolute; width:160px; height:160px; border-radius:50%;
        background:radial-gradient(circle, rgba(200,16,46,0.30) 0%, transparent 70%);
        animation:glowPulse 2.5s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%,100% { opacity:0.35; transform:scale(0.9); }
        50%      { opacity:1;    transform:scale(1.5); }
      }

      /* Logo image */
      .logo-img {
        width:190px; height:auto; object-fit:contain;
        position:relative; z-index:2;
        animation:logoBreath 3s ease-in-out infinite;
        filter:drop-shadow(0 0 20px rgba(200,16,46,0.40));
      }
      @keyframes logoBreath {
        0%,100% { transform:scale(1);    filter:drop-shadow(0 0 16px rgba(200,16,46,0.30)); }
        50%      { transform:scale(1.04); filter:drop-shadow(0 0 32px rgba(200,16,46,0.65)); }
      }

      /* Orbiting bolt */
      .orbit-wrapper {
        position:absolute; inset:0; border-radius:50%;
        animation:orbit 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
        z-index:3;
      }
      @keyframes orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

      .bolt-dot {
        position:absolute; top:-14px; left:50%; transform:translateX(-50%);
        width:28px; height:28px;
        background:#0A0A0A; border-radius:50%;
        border:1.5px solid rgba(200,16,46,0.5);
        display:flex; align-items:center; justify-content:center;
        box-shadow:0 0 14px rgba(200,16,46,0.7), inset 0 0 6px rgba(200,16,46,0.2);
      }
      .bolt-inner {
        animation:counterOrbit 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
        display:flex; align-items:center; justify-content:center;
      }
      @keyframes counterOrbit { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }

      /* Tagline */
      .loader-tagline {
        margin-top:36px;
        font-family:'Bebas Neue', sans-serif;
        font-size:12px; letter-spacing:6px;
        color:rgba(255,255,255,0.22); text-transform:uppercase;
        animation:fadeTagline 2s ease-in-out infinite alternate;
      }
      @keyframes fadeTagline { from{opacity:0.12} to{opacity:0.6} }

      /* Bouncing dots */
      .loader-dots { display:flex; gap:7px; margin-top:18px; }
      .loader-dots span {
        width:5px; height:5px; border-radius:50%; background:#C8102E;
        animation:dotBounce 1.2s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2){animation-delay:0.2s}
      .loader-dots span:nth-child(3){animation-delay:0.4s}
      @keyframes dotBounce {
        0%,80%,100%{opacity:0.25;transform:scale(0.8)}
        40%        {opacity:1;   transform:scale(1.4)}
      }

      /* Bottom progress bar */
      .loader-bar {
        position:fixed; bottom:0; left:0; height:3px;
        background:linear-gradient(90deg,#C8102E,#FF3B5C);
        animation:loadBar 2.8s ease-out forwards;
        box-shadow:0 0 12px rgba(200,16,46,0.8);
      }
      @keyframes loadBar {
        0%  {width:0%}  60%{width:75%} 90%{width:92%} 100%{width:100%}
      }
    </style>
  </head>
