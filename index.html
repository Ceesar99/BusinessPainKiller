<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusinessPainKiller</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body { background: #52585d; }

      #bpk-loader {
        position: fixed;
        inset: 0;
        /* Match the logo's own background color exactly */
        background: #52585d;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        transition: opacity 1.2s ease, visibility 1.2s ease;
      }

      #bpk-loader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Breathing logo — no shadow, no glow, just the logo */
      .logo {
        width: 260px;
        height: auto;
        object-fit: contain;
        animation: breathe 2.8s ease-in-out infinite;
        /* Remove any white/grey fringing from the image */
        image-rendering: crisp-edges;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1);    opacity: 0.88; }
        50%       { transform: scale(1.06); opacity: 1;    }
      }
    </style>
  </head>
  <body>

    <div id="bpk-loader">
      <img
        class="logo"
        src="/favicon-192x192.png"
        alt="BusinessPainKiller"
        onerror="this.src='/favicon-32x32.png'"
      />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        var loader = document.getElementById('bpk-loader');
        var root   = document.getElementById('root');

        function dismiss() {
          // Wait at least 2s so splash is visible, then fade out
          setTimeout(function () {
            loader.classList.add('hide');
            // Re-enable scroll and remove loader from DOM after fade
            setTimeout(function () {
              document.body.style.overflow = '';
              document.body.style.background = '#0A0A0A';
              if (loader && loader.parentNode) {
                loader.parentNode.removeChild(loader);
              }
            }, 1300);
          }, 2000);
        }

        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            dismiss();
          }
        });
        observer.observe(root, { childList: true });

        // Hard fallback — always dismisses after 6s
        setTimeout(function () {
          observer.disconnect();
          dismiss();
        }, 6000);
      })();
    </script>

  </body>
</html>
