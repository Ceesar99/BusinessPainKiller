<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusinessPainKiller</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      #bpk-loader {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        transition: opacity 1.2s ease, visibility 1.2s ease;
      }

      #bpk-loader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Smaller logo */
      .logo {
        width: 180px;
        height: auto;
        animation: breathe 2.8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 8px rgba(200,16,46,0.3));
        }
        50% {
          transform: scale(1.07);
          filter: drop-shadow(0 0 24px rgba(200,16,46,0.75))
                  drop-shadow(0 0 48px rgba(200,16,46,0.25));
        }
      }

      /* Business name */
      .brand-name {
        font-family: 'Manrope', sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.3px;
      }

      .brand-name span { color: #C8102E; }

      /* Tagline */
      .tagline {
        font-family: 'Manrope', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        margin-top: -16px;
      }

      .tagline span { color: #C8102E; }
    </style>
  </head>

    <script>
      (function () {
        var loader = document.getElementById('bpk-loader');
        var root   = document.getElementById('root');

        function dismiss() {
          setTimeout(function () {
            loader.classList.add('hide');
            setTimeout(function () {
              if (loader && loader.parentNode) {
                loader.parentNode.removeChild(loader);
              }
            }, 1300);
          }, 2500);
        }

        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            dismiss();
          }
        });
        observer.observe(root, { childList: true });

        setTimeout(function () {
          observer.disconnect();
          dismiss();
        }, 6000);
      })();
    </script>
