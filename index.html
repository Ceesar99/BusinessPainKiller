<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusinessPainKiller</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body { background: #0A0A0A; overflow: hidden; }

      #bpk-loader {
        position: fixed;
        inset: 0;
        background: #0A0A0A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.9s ease, visibility 0.9s ease;
      }

      #bpk-loader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Breathing logo */
      .logo {
        width: 200px;
        height: auto;
        object-fit: contain;
        animation: breathe 2.6s ease-in-out infinite;
      }

      @keyframes breathe {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(200, 16, 46, 0.4))
                  drop-shadow(0 0 30px rgba(200, 16, 46, 0.15));
        }
        50% {
          transform: scale(1.07);
          filter: drop-shadow(0 0 24px rgba(200, 16, 46, 0.85))
                  drop-shadow(0 0 60px rgba(200, 16, 46, 0.35));
        }
      }

      /* Bottom progress bar */
      .progress-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 3px;
        width: 0%;
        background: linear-gradient(90deg, #9B0B22, #C8102E, #FF3B5C);
        box-shadow: 0 0 12px rgba(200, 16, 46, 0.8);
        animation: progressFill 2.8s ease-out forwards;
      }

      @keyframes progressFill {
        0%   { width: 0%;   }
        60%  { width: 75%;  }
        90%  { width: 92%;  }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>

    <div id="bpk-loader">
      <img
        class="logo"
        src="/favicon-192x192.png"
        alt="BusinessPainKiller"
        onerror="this.src='/favicon-32x32.png'"
      />
      <div class="progress-bar"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        var loader = document.getElementById('bpk-loader');
        var root   = document.getElementById('root');

        function dismiss() {
          setTimeout(function () {
            loader.classList.add('hide');
            setTimeout(function () {
              if (loader && loader.parentNode) {
                loader.parentNode.removeChild(loader);
              }
              document.body.style.overflow = '';
            }, 1000);
          }, 400);
        }

        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            dismiss();
          }
        });
        observer.observe(root, { childList: true });

        // Hard fallback — always dismisses after 5s
        setTimeout(function () {
          observer.disconnect();
          dismiss();
        }, 5000);
      })();
    </script>

  </body>
</html>
